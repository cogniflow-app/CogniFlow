name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CI: true
  NEXT_TELEMETRY_DISABLED: 1
  SUPABASE_TELEMETRY_DISABLED: true
  NEXT_PUBLIC_APP_NAME: Lumen
  NEXT_PUBLIC_APP_URL: https://verification.example.test
  NEXT_PUBLIC_SUPABASE_URL: https://supabase.verification.example.test
  NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ci-public-placeholder
  AUTH_EMAIL_CONFIRMATION_REQUIRED: false
  AUTH_OAUTH_GOOGLE_ENABLED: false
  AUTH_OAUTH_GITHUB_ENABLED: false
  AUTH_OAUTH_AZURE_ENABLED: false
  SUPABASE_SECRET_KEY: ci-server-placeholder-at-least-24-characters
  DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
  DEPLOYMENT_PROFILE: cloudflare
  ENABLE_CHILD_PROFILES: false
  ENABLE_PUBLIC_CHILD_CONTENT: false
  ENABLE_FREE_TEXT_GAME_CHAT: false
  PARENTAL_CONSENT_MODE: disabled
  PROFILE_SESSION_TTL_MINUTES: 30
  GUEST_SESSION_RETENTION_HOURS: 24
  EXPORT_DOWNLOAD_RETENTION_DAYS: 7
  DELETION_GRACE_PERIOD_DAYS: 30
  AUDIT_EVENT_RETENTION_DAYS: 365
  RATE_LIMIT_WINDOW_SECONDS: 900
  RATE_LIMIT_SIGNUP_ATTEMPTS: 5
  RATE_LIMIT_PASSWORD_RESET_ATTEMPTS: 5
  RATE_LIMIT_PROFILE_PIN_ATTEMPTS: 5
  RATE_LIMIT_GUEST_CREATION_ATTEMPTS: 20
  RATE_LIMIT_DESTRUCTIVE_REQUEST_ATTEMPTS: 3
  APP_ENCRYPTION_KEY: ci-only-app-encryption-key-at-least-32-bytes
  GUEST_TOKEN_SIGNING_KEY: ci-only-guest-signing-key-at-least-32-bytes
  NEXT_SERVER_ACTIONS_ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
  NEXT_PUBLIC_BUILD_VERSION: ci-${{ github.sha }}

jobs:
  quality:
    name: Static, unit, and builds
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.13.0

      - name: Install Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.18.0
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm format:check

      - name: Scan repository for secrets
        run: pnpm secret:scan

      - name: Lint and verify dependency boundaries
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Run unit, interaction, and property tests
        shell: bash
        run: |
          mkdir -p test-results/unit
          set -o pipefail
          pnpm test 2>&1 | tee test-results/unit/vitest.log

      - name: Build production application
        run: pnpm build

      - name: Build portable OpenNext artifact
        run: pnpm build:portable

      - name: Upload unit/build diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: quality-failure-${{ github.run_id }}
          if-no-files-found: ignore
          path: |
            **/coverage/**
            .lighthouseci/**
            test-results/**
          retention-days: 7

  database:
    name: Local Supabase migrations and pgTAP
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.13.0

      - name: Install Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.18.0
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Supabase CLI
        uses: supabase/setup-cli@46f7f98c7f948ad727d22c1e67fab04c223a0520 # v3.0.0
        with:
          version: 2.109.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start local Supabase
        run: pnpm db:start >/dev/null 2>&1

      - name: Apply migrations from empty
        run: pnpm db:reset

      - name: Run database tests
        shell: bash
        run: |
          mkdir -p test-results/database
          set -o pipefail
          pnpm test:db 2>&1 | tee test-results/database/pgtap.log

      - name: Verify generated database types
        run: pnpm db:types:check

      - name: Upload database diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: database-failure-${{ github.run_id }}
          if-no-files-found: ignore
          path: test-results/database/**
          retention-days: 7

      - name: Stop local Supabase
        if: always()
        run: supabase stop --no-backup

  e2e:
    name: Playwright end-to-end
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.13.0

      - name: Install Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.18.0
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Supabase CLI
        uses: supabase/setup-cli@46f7f98c7f948ad727d22c1e67fab04c223a0520 # v3.0.0
        with:
          version: 2.109.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install pinned Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Start and reset local Supabase
        run: |
          pnpm db:start >/dev/null 2>&1
          pnpm db:reset

      - name: Run Playwright
        run: pnpm test:e2e

      - name: Upload Playwright diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-failure-${{ github.run_id }}
          if-no-files-found: ignore
          path: |
            playwright-report/**
            test-results/e2e/**
          retention-days: 7

      - name: Stop local Supabase
        if: always()
        run: supabase stop --no-backup

  accessibility:
    name: Axe accessibility
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.13.0

      - name: Install Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.18.0
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Supabase CLI
        uses: supabase/setup-cli@46f7f98c7f948ad727d22c1e67fab04c223a0520 # v3.0.0
        with:
          version: 2.109.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install pinned Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Start and reset local Supabase
        run: |
          pnpm db:start >/dev/null 2>&1
          pnpm db:reset

      - name: Run axe checks
        run: pnpm test:a11y

      - name: Upload accessibility diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: accessibility-failure-${{ github.run_id }}
          if-no-files-found: ignore
          path: |
            playwright-report/a11y/**
            test-results/a11y/**
          retention-days: 7

      - name: Stop local Supabase
        if: always()
        run: supabase stop --no-backup

  performance:
    name: Lighthouse and load smoke
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.13.0

      - name: Install Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.18.0
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install k6
        uses: grafana/setup-k6-action@db07bd9765aac508ef18982e52ab937fe633a065 # v1.2.1
        with:
          k6-version: 2.1.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install pinned Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Lighthouse budgets
        shell: bash
        run: |
          CHROME_PATH="$(node --input-type=module -e 'import { chromium } from "@playwright/test"; process.stdout.write(chromium.executablePath())')" pnpm test:lighthouse

      - name: Run k6 health smoke
        run: pnpm test:load

      - name: Upload performance diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: performance-failure-${{ github.run_id }}
          if-no-files-found: ignore
          path: |
            .lighthouseci/**
            test-results/**
          retention-days: 7
